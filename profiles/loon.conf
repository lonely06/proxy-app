[Remote Filter]
All_Filter = NameRegex, FilterKey = "(?i)^(?!.*(直连|direct|reject|剩余|流量|套餐|到期|官网|订阅)).*$"
SG_Filter = NameRegex, FilterKey = "(?i)(新加坡|狮城|sg|singapore|沪新|京新|深新|杭新|广新|坡|🇸🇬)"
JP_Filter = NameRegex, FilterKey = "(?i)(日本|jp|japan|东京|東京|大阪|埼玉|川日|沪日|深日|泉日|🇯🇵)"
HK_Filter = NameRegex, FilterKey = "(?i)(香港|港|hk|hong ?kong|hongkong|🇭🇰)"
US_Filter = NameRegex, FilterKey = "(?i)(美国|美西|美东|us|united ?states|america|🇺🇸)"

[Rule]
DOMAIN-SUFFIX,local,🎯 直连
DOMAIN-SUFFIX,localhost,🎯 直连
IP-CIDR,10.0.0.0/8,🎯 直连,no-resolve
IP-CIDR,100.64.0.0/10,🎯 直连,no-resolve
IP-CIDR,127.0.0.0/8,🎯 直连,no-resolve
IP-CIDR,169.254.0.0/16,🎯 直连,no-resolve
IP-CIDR,172.16.0.0/12,🎯 直连,no-resolve
IP-CIDR,192.168.0.0/16,🎯 直连,no-resolve
IP-CIDR,198.18.0.0/15,🎯 直连,no-resolve
GEOIP,CN,🎯 直连
FINAL,🕳️ 漏网之鱼

