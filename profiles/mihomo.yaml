  - RULE-SET,proxy,🚀 默认代理
  - RULE-SET,private_domain,直连
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,ai,🤖 AI
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,telegram_domain,💬 社交平台
  - RULE-SET,twitter_domain,💬 社交平台
  - RULE-SET,discord_domain,💬 社交平台
  - RULE-SET,docker_domain,🛠️ 开发服务
  - RULE-SET,npmjs_domain,🛠️ 开发服务
  - RULE-SET,python_domain,🛠️ 开发服务
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,speedtest_domain,✈️ Speedtest
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,gfw_domain,🚀 默认代理
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,🎯 直连
  - RULE-SET,google_ip,🍀 Google,no-resolve
  - RULE-SET,telegram_ip,💬 社交平台,no-resolve
  - RULE-SET,twitter_ip,💬 社交平台,no-resolve
  - RULE-SET,cn_ip,🎯 直连
  - MATCH,🕳️ 漏网之鱼

# 规则集
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs, proxy: 🚀 默认代理}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs, proxy: 🚀 默认代理}
  class: &class {type: http, interval: 86400, behavior: classical, format: text, proxy: 🚀 默认代理}
rule-providers:
  private_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  private_ip: { <<: *ip, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"}
