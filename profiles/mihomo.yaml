# 必读！！！
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅
proxy-providers:
  Airport1:
    url: "机场订阅填到这里，两端引号不要去掉，不要填写到下方链接里去！！"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
# interface-name: en0
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板，external-ui 路径如果出现报错，根据你使用的插件进行调整，比如openclash改为： /etc/openclash/run  ，裸核跑改为/etc/mihomo/run
# 因容易造成新手面板启动问题，我注释掉了，需要的自行开启
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: "/etc/nikki/run"
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探
sniffer:
  enable: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false

  # DNS 查询本身遵守 rules
  # 官方说明：开启后 DNS 连接会遵守路由规则，且需要配置 proxy-server-nameserver
  respect-rules: true

  # TUN 透明代理场景继续用 fake-ip
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist

  fake-ip-filter:
    - "rule-set:private_domain"
    - "rule-set:cn_domain"
    - "+.lan"
    - "+.local"
    - "+.localhost"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.ntp.org"
    - "+.pool.ntp.org"
    - "+.market.xiaomi.com"

  # 用来解析 DNS 服务器自身域名，必须尽量填 IP
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 专门解析代理节点域名，避免代理节点域名解析递归
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  # 直连出口固定走国内 DNS
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # direct-nameserver 不跟随 nameserver-policy，避免直连域名被国外 DNS 解析
  direct-nameserver-follow-policy: false

  # DNS 按大方向分流；AI / GitHub / 社交平台按对应业务组联动
  nameserver-policy:
    "rule-set:private_domain":
      - 223.5.5.5
      - 119.29.29.29

    "rule-set:cn_domain":
      - 223.5.5.5
      - 119.29.29.29

    "rule-set:ai":
      - https://1.1.1.1/dns-query#🤖 AI
      - https://8.8.8.8/dns-query#🤖 AI

    "rule-set:github_domain":
      - https://1.1.1.1/dns-query#👨🏿‍💻 GitHub
      - https://8.8.8.8/dns-query#👨🏿‍💻 GitHub

    "rule-set:telegram_domain":
      - https://1.1.1.1/dns-query#💬 社交平台
      - https://8.8.8.8/dns-query#💬 社交平台

    "rule-set:twitter_domain":
      - https://1.1.1.1/dns-query#💬 社交平台
      - https://8.8.8.8/dns-query#💬 社交平台

    "rule-set:discord_domain":
      - https://1.1.1.1/dns-query#💬 社交平台
      - https://8.8.8.8/dns-query#💬 社交平台

    "rule-set:gfw_domain":
      - https://1.1.1.1/dns-query#🚀 默认代理
      - https://8.8.8.8/dns-query#🚀 默认代理

    "rule-set:geolocation-!cn":
      - https://1.1.1.1/dns-query#🚀 默认代理
      - https://8.8.8.8/dns-query#🚀 默认代理

  # 默认 DNS：未命中 nameserver-policy 的域名走这里
  nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

# 出站策略，根据自己情况调整每个策略里分组排序，增删都可以，比如把美国自动放到第一个，注意别漏掉表情逗号等。
# 如果相应分组没有筛选到对应的国家，请根据自己节点名字调整筛选关键字。
# 没有再使用锚点，是考虑很多新手修改难度，这样新手修改某个分组更容易些。
proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [🇸🇬♻️ 狮城自动, 🇯🇵♻️ 日本自动, 🇭🇰♻️ 香港自动, 🇺🇲♻️ 美国自动, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇺🇲 美国节点, 🌐 全部节点, 直连]}
