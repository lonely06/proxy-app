  - {name: 💬 社交平台, type: select, proxies: [🇸🇬♻️ 狮城自动, 🇯🇵♻️ 日本自动, 🇭🇰♻️ 香港自动, 🇺🇲♻️ 美国自动, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇺🇲 美国节点, 🌐 全部节点, 直连]}
  - {name: 🛠️ 开发服务, type: select, proxies: [🇸🇬♻️ 狮城自动, 🇯🇵♻️ 日本自动, 🇭🇰♻️ 香港自动, 🇺🇲♻️ 美国自动, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇺🇲 美国节点, 🌐 全部节点, 直连]}
  - {name: 📹 YouTube, type: select, proxies: [🇸🇬♻️ 狮城自动, 🇯🇵♻️ 日本自动, 🇭🇰♻️ 香港自动, 🇺🇲♻️ 美国自动, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇺🇲 美国节点, 🌐 全部节点, 直连]}
  - {name: 🍀 Google, type: select, proxies: [🇸🇬♻️ 狮城自动, 🇯🇵♻️ 日本自动, 🇭🇰♻️ 香港自动, 🇺🇲♻️ 美国自动, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇺🇲 美国节点, 🌐 全部节点, 直连]}
